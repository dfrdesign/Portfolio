<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Coming Soon — Daniela Felix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0a0a0a;
      --fg: #ffffff;
      --muted: rgba(255, 255, 255, 0.62);
      --soft-line: rgba(255, 255, 255, 0.06);
      --soft-grid: rgba(255, 255, 255, 0.03);
      --red: #ff3b30;
      --red-soft: rgba(255, 59, 48, 0.22);
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--soft-grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--soft-grid) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .noise {
      position: absolute;
      inset: 0;
      opacity: 0.02;
      background-image:
        radial-gradient(circle at 20% 20%, white 0.5px, transparent 0.6px),
        radial-gradient(circle at 80% 30%, white 0.5px, transparent 0.6px),
        radial-gradient(circle at 40% 70%, white 0.5px, transparent 0.6px),
        radial-gradient(circle at 70% 80%, white 0.5px, transparent 0.6px);
      background-size: 180px 180px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      width: min(92vw, 760px);
      text-align: center;
      padding: 32px 24px;
    }

    .dot-wrap {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 28px;
      margin-bottom: 28px;
    }

    .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--red);
      position: relative;
      transition:
        transform 0.08s linear,
        box-shadow 0.14s ease,
        opacity 0.2s ease;
      animation: idlePulse 1.8s ease-in-out infinite;
      will-change: transform;
      box-shadow: 0 0 0 rgba(255, 59, 48, 0);
    }

    .dot::after {
      content: "";
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(255, 59, 48, 0.14);
      transform: scale(0.92);
    }

    @keyframes idlePulse {
      0% {
        opacity: 0.45;
      }
      50% {
        opacity: 1;
      }
      100% {
        opacity: 0.45;
      }
    }

    h1 {
      font-size: clamp(2.3rem, 5vw, 4.25rem);
      font-weight: 600;
      letter-spacing: -0.055em;
      line-height: 0.95;
      margin-bottom: 16px;
    }

    p {
      max-width: 580px;
      margin: 0 auto;
      font-size: 1rem;
      line-height: 1.75;
      font-weight: 300;
      color: var(--muted);
    }

    .socials-wrap {
      margin-top: 34px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .socials {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 8px 12px;
      border: 1px solid var(--soft-line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.015);
      backdrop-filter: blur(6px);
    }

    .social-link {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.86);
      text-decoration: none;
      transition:
        transform 0.2s ease,
        background 0.2s ease,
        color 0.2s ease,
        box-shadow 0.2s ease;
    }

    .social-link:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.045);
      color: #ffffff;
      box-shadow: 0 8px 24px rgba(255, 255, 255, 0.05);
    }

    .social-link svg {
      width: 17px;
      height: 17px;
      fill: currentColor;
      display: block;
    }

    .handle {
      font-size: 0.76rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.34);
    }

    .footer {
      position: absolute;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      z-index: 2;
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.28);
      letter-spacing: 0.12em;
      white-space: nowrap;
    }

    @media (max-width: 640px) {
      .container {
        padding: 24px 18px;
      }

      .socials {
        gap: 6px;
        padding: 8px 10px;
      }

      .social-link {
        width: 38px;
        height: 38px;
      }

      p {
        font-size: 0.96rem;
      }
     
    }
  </style>
</head>
<body>
 
  <div class="noise"></div>

  <main class="container">
    <div class="dot-wrap">
      <div class="dot" id="interactiveDot"></div>
    </div>

    <h1>Daniela Felix</h1>

    <p>
      A new portfolio exploring design, engineering, and interactive systems is coming soon.
    </p>

    <div class="socials-wrap">
      <div class="socials">
        <a
          class="social-link"
          href="https://www.instagram.com/dfr_design/"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Instagram"
          title="Instagram"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M7 2h10a5 5 0 0 1 5 5v10a5 5 0 0 1-5 5H7a5 5 0 0 1-5-5V7a5 5 0 0 1 5-5Zm0 2.2A2.8 2.8 0 0 0 4.2 7v10A2.8 2.8 0 0 0 7 19.8h10a2.8 2.8 0 0 0 2.8-2.8V7A2.8 2.8 0 0 0 17 4.2H7Zm10.35 1.45a1.2 1.2 0 1 1 0 2.4 1.2 1.2 0 0 1 0-2.4ZM12 7a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 2.2A2.8 2.8 0 1 0 12 14.8 2.8 2.8 0 0 0 12 9.2Z"/>
          </svg>
        </a>

        <a
          class="social-link"
          href="https://www.behance.net/danielafelixdesign"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="Behance"
          title="Behance"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9.4 11.1c1.18-.56 1.8-1.56 1.8-2.93C11.2 5.45 9.4 4 6.53 4H1v16h5.76c3.1 0 5.2-1.53 5.2-4.28 0-2.03-1.14-3.52-2.56-4.02ZM4.1 6.45h2.19c1.36 0 2.08.56 2.08 1.62 0 1.1-.8 1.64-2.23 1.64H4.1V6.45Zm2.42 11.1H4.1v-3.52h2.5c1.58 0 2.42.59 2.42 1.76 0 1.17-.87 1.76-2.5 1.76ZM17.65 8.3c-3.6 0-5.85 2.44-5.85 6 0 3.76 2.2 6 5.9 6 2.85 0 4.8-1.34 5.5-3.74h-2.9c-.34.78-1.1 1.28-2.48 1.28-1.73 0-2.85-1.03-2.96-2.95H23.4c.03-.28.05-.56.05-.81 0-3.42-2.18-5.78-5.8-5.78Zm0 2.38c1.53 0 2.5.86 2.66 2.45h-5.37c.22-1.58 1.24-2.45 2.71-2.45ZM14.4 4h6.2v1.95h-6.2V4Z"/>
          </svg>
        </a>

        <a
          class="social-link"
          href="https://www.linkedin.com/in/danielafelixdesign"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="LinkedIn"
          title="LinkedIn"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4.98 3.5A2.49 2.49 0 1 1 5 8.48 2.49 2.49 0 0 1 4.98 3.5ZM3 9h4v12H3V9Zm6.5 0h3.84v1.64h.06c.53-1 1.84-2.06 3.8-2.06 4.07 0 4.82 2.54 4.82 5.84V21h-4v-5.5c0-1.31-.02-2.99-1.82-2.99-1.82 0-2.1 1.42-2.1 2.89V21h-4V9Z"/>
          </svg>
        </a>
      </div>

      <div class="handle">@dfr_design</div>
    </div>
  </main>

  <div class="footer">© 2026</div>

  <script>
    const dot = document.getElementById('interactiveDot');

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let dotX = 0;
    let dotY = 0;
    let dotBaseX = 0;
    let dotBaseY = 0;

    function updateDotBase() {
      const rect = dot.getBoundingClientRect();
      dotBaseX = rect.left + rect.width / 2;
      dotBaseY = rect.top + rect.height / 2;
    }

    window.addEventListener('load', updateDotBase);
    window.addEventListener('resize', () => {
      dot.style.transform = 'translate(0px, 0px) scale(1)';
      updateDotBase();
    });

    window.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    function animate() {
      const dx = mouseX - dotBaseX;
      const dy = mouseY - dotBaseY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      const maxMove = 18;
      const influenceRadius = 260;

      let targetX = 0;
      let targetY = 0;
      let scale = 1;

      if (distance < influenceRadius) {
        const influence = 1 - distance / influenceRadius;
        targetX = (dx / influenceRadius) * maxMove;
        targetY = (dy / influenceRadius) * maxMove;
        scale = 1 + influence * 0.42;

        dot.style.boxShadow = `0 0 ${10 + influence * 20}px rgba(255, 59, 48, ${0.12 + influence * 0.3})`;
      } else {
        dot.style.boxShadow = `0 0 0px rgba(255, 59, 48, 0)`;
      }

      dotX += (targetX - dotX) * 0.14;
      dotY += (targetY - dotY) * 0.14;

      dot.style.transform = `translate(${dotX}px, ${dotY}px) scale(${scale})`;

      requestAnimationFrame(animate);
    }

    animate();
    


  </script>
</body>
</html>
