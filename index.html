<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coming Soon — Daniela Felix</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font similar vibe -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    /* subtle grid background */
    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      z-index: 0;
    }

    .container {
      text-align: center;
      z-index: 1;
      padding: 20px;
      max-width: 600px;
    }

    .dot {
      width: 10px;
      height: 10px;
      background: white;
      border-radius: 50%;
      margin: 0 auto 30px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.2; }
      50% { opacity: 1; }
      100% { opacity: 0.2; }
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }

    p {
      font-size: 1rem;
      font-weight: 300;
      color: rgba(255,255,255,0.6);
      line-height: 1.6;
    }

    .footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.1em;
    }

  </style>
</head>
<body>

  <div class="container">
    <div class="dot"></div>

    <h1>Daniela Felix</h1>

    <p>
      A new portfolio exploring design, engineering, and interactive systems is coming soon.
    </p>
  </div>

  <div class="footer">
    © 2026
  </div>

</body>
</html>
